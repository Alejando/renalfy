services:
  postgres:
    image: postgres:16-alpine
    container_name: renalfy-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: renalfy
      POSTGRES_PASSWORD: renalfy_dev
      POSTGRES_DB: renalfy
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: renalfy-api
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: postgresql://renalfy_app:renalfy_app_dev@postgres:5432/renalfy
      DATABASE_MIGRATION_URL: postgresql://renalfy:renalfy_dev@postgres:5432/renalfy
      JWT_SECRET: dev-secret-change-in-production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_REFRESH_EXPIRES_IN: 7d
      NODE_ENV: development
      PORT: 4001
    depends_on:
      - postgres

volumes:
  postgres_data:
